name: Yearly Package Update (October)

on:
  schedule:
    - cron: '0 8 1 10 *'  # October 1st at 08:00 UTC — reminder to do yearly update
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libudunits2-dev libgdal-dev

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('httr', 'jsonlite', 'rvest', 'xml2', 'stringr', 'purrr', 'dplyr', 'sf', 'devtools', 'parallel'), repos='https://cloud.r-project.org')"

      - name: Install PDOK package
        run: Rscript -e "devtools::install('.', dependencies = FALSE, upgrade = 'never')"

      - name: Run function tests
        run: Rscript tests/test_all_functions.R

      - name: Remind about manual data refresh
        run: |
          echo "============================================"
          echo "YEARLY UPDATE REMINDER — October"
          echo "============================================"
          echo "Tests passed. Now do the manual update:"
          echo "1. Open RStudio in r_pdok_package folder"
          echo "2. source('data-raw/refresh_pchn6_geo.R')"
          echo "3. source('data-raw/refresh_pdok_datasets.R')"
          echo "4. devtools::install()"
          echo "5. source('tests/test_all_functions.R')"
          echo "6. git add data/ && git commit && git push"
          echo "============================================"
