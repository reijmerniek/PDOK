name: Monthly Function Test

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month at 08:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libudunits2-dev libgdal-dev

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('httr', 'jsonlite', 'rvest', 'xml2', 'stringr', 'purrr', 'dplyr', 'sf', 'devtools'), repos='https://cloud.r-project.org')"

      - name: Install PDOK package
        run: Rscript -e "devtools::install('.', dependencies = FALSE, upgrade = 'never')"

      - name: Run function tests
        run: Rscript tests/test_all_functions.R
